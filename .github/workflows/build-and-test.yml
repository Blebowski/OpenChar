name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            tcl \
            tcl-dev \
            libreadline-dev \
            tcl-tclreadline \
            tk \
            tk-dev \
            ngspice

      - name: Configure (CMake)
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --parallel $(nproc)

      # TODO: Re-enable tests on self-hosted runner that has enough performance
      #       to run the tests in reasonable time.
